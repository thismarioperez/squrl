name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install alerter
        env:
          ALERTER_VERSION: "26.5"
          ALERTER_SHA256: "11f63cddc9bb3f8554ed9b762632a120cfa7bee05e3c09d65734823e09d24f10"
        run: |
          curl -fsSL "https://github.com/vjeantet/alerter/releases/download/v${ALERTER_VERSION}/alerter-${ALERTER_VERSION}.zip" -o alerter.zip
          echo "${ALERTER_SHA256}  alerter.zip" | shasum -a 256 --check
          unzip -q alerter.zip -d alerter-bin
          sudo mv alerter-bin/alerter /usr/local/bin/alerter

      - name: Build .app bundle
        env:
          LDFLAGS: "-X main.version=${{ github.ref_name }}"
        run: bash scripts/build-app.sh

      - name: Build CLI binary
        run: |
          CGO_ENABLED=1 go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o bin/squrl \
            ./cmd/squrl/

      - name: Package app
        run: tar -czf squrl-tray-${{ github.ref_name }}-darwin-arm64.tar.gz -C bin Squrl.app

      - name: Package CLI
        run: tar -czf squrl-${{ github.ref_name }}-darwin-arm64.tar.gz -C bin squrl

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64-tray
          path: squrl-tray-${{ github.ref_name }}-darwin-arm64.tar.gz

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: squrl-${{ github.ref_name }}-darwin-arm64.tar.gz

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install CGo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libayatana-indicator3-dev \
            libayatana-ido3-0.4-dev \
            libx11-dev

      - name: Build binary
        run: |
          CGO_ENABLED=1 go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o squrl-tray \
            ./cmd/squrl-tray/

      - name: Build CLI binary
        run: |
          CGO_ENABLED=1 go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o squrl \
            ./cmd/squrl/

      - name: Package
        run: tar -czf squrl-tray-${{ github.ref_name }}-linux-amd64.tar.gz squrl-tray

      - name: Package CLI
        run: tar -czf squrl-${{ github.ref_name }}-linux-amd64.tar.gz squrl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-tray
          path: squrl-tray-${{ github.ref_name }}-linux-amd64.tar.gz

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: squrl-${{ github.ref_name }}-linux-amd64.tar.gz

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          go build `
            -ldflags "-X main.version=${{ github.ref_name }}" `
            -o squrl-tray.exe `
            ./cmd/squrl-tray/
        env:
          CGO_ENABLED: "1"

      - name: Build CLI binary
        run: |
          go build `
            -ldflags "-X main.version=${{ github.ref_name }}" `
            -o squrl.exe `
            ./cmd/squrl/
        env:
          CGO_ENABLED: "1"

      - name: Package
        run: Compress-Archive -Path squrl-tray.exe -DestinationPath squrl-tray-${{ github.ref_name }}-windows-amd64.zip

      - name: Package CLI
        run: Compress-Archive -Path squrl.exe -DestinationPath squrl-${{ github.ref_name }}-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-tray
          path: squrl-tray-${{ github.ref_name }}-windows-amd64.zip

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: squrl-${{ github.ref_name }}-windows-amd64.zip

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist/
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        run: |
          prerelease_flag=""
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "Squrl ${{ github.ref_name }}" \
            --generate-notes \
            $prerelease_flag \
            dist/*
        env:
          GH_TOKEN: ${{ github.token }}
