[tools]
go = "1.26"
golangci-lint = "2"

[env]
CGO_ENABLED = "1"

[tasks.check-deps]
description = "Verify required system dependencies are installed (Linux only)"
run = "scripts/check-deps-linux.sh"

[tasks.build]
description = "Build the binary to bin/squrl. Extra args are forwarded to go build."
depends = ["check-deps"]
run = "go build -ldflags \"-X main.version=dev\" -o bin/squrl ./cmd/squrl/ $@"

[tasks.build-debug]
description = "Build the binary with debug symbols (no optimisations) to bin/squrl — Linux debug attach target"
depends = ["check-deps"]
run = "go build -gcflags \"all=-N -l\" -ldflags \"-X main.version=dev\" -o bin/squrl ./cmd/squrl/"

[tasks.bundle]
description = "Build the macOS .app bundle (Squrl.app) — macOS only. Pass 'debug' to build with debug symbols."
depends = ["clean"]
run = "scripts/build-app.sh $@"

[tasks.install-bundle]
description = "Install the macOS .app bundle (Squrl.app) — macOS only"
depends = ["bundle"]
run = "scripts/install-bundle.sh"

[tasks.start]
description = "Run the app directly (development). Extra args are forwarded to go run."
depends = ["check-deps"]
env = { "SQURL_DEBUG" = "1" }
run = "go run ./cmd/squrl/ $@"

[tasks.start-macos]
description = "Run the app on macOS (development) — builds a dev .app bundle so the menu bar icon appears"
depends = ["check-deps"]
env = { "SQURL_DEBUG" = "1" }
run = "mise run bundle && bin/Squrl.app/Contents/MacOS/squrl $@"

[tasks.debug-macos]
description = "Run under Delve on macOS — builds a dev .app bundle with debug symbols then launches dlv exec"
depends = ["check-deps"]
env = { "SQURL_DEBUG" = "1" }
run = "mise run bundle debug && dlv exec bin/Squrl.app/Contents/MacOS/squrl"

[tasks.test]
description = "Run all tests. Extra args are forwarded to go test (e.g. -run TestFoo -v)."
run = "go test ./... $@"

[tasks.tidy]
description = "Tidy go modules"
run = "go mod tidy"

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf bin/"

[tasks.release]
description = "Take a release build. Extra args are forwarded to ./scripts/release.sh"
run = "./scripts/release.sh $@"